<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inicio de sesión | Legacy Jerseys</title>

    <link rel="stylesheet" href="/CSS/estilos.css">

</head>

<body class="fondo-login">

    <div class="login">

        <!-- Formulario -->

        <div class="login-form">

            <a href="pagina_principal.html" class="volver">
                ← Volver al inicio
            </a>

            <h1>Inicio de sesión</h1>

            <p>Ingresa tus datos para continuar</p>

            <input type="email" placeholder="Correo electrónico">

            <input type="password" placeholder="Contraseña">

            <div class="opciones">

                <label>
                    Recordarme  <a href="#"> ¿Olvidaste tu contraseña?</a>
                    
                   

                </label>

                

            </div>

            <br>

            <button class="boton-login">
                Iniciar sesión
            </button>

            <button class="crear" onclick="mostrarRegistro()">
                Crear una cuenta
            </button>

            

            <div id="registro" style="display:none;">

                <h2>Crear cuenta</h2>

                <input type="text" placeholder="Nombre completo">

                <input type="email" placeholder="Correo electrónico">

                <input type="password" placeholder="Contraseña">

                <input type="password" placeholder="Confirmar contraseña">

                <button class="boton-login">
                    Registrarse
                </button>

            </div>

        </div>

        <!-- Imagen -->

        <div class="login-imagen">

            <img src="pictures/futbol.jpg" alt="Jerseys">

            <div class="beneficios">

                

    </div>

    <script>

        function mostrarRegistro() {

            var registro = document.getElementById("registro");

            if (registro.style.display === "none") {

                registro.style.display = "block";

            } else {

                registro.style.display = "none";

            }

        }

    </script>

<script src="script/scrip.js"></script>
</body>

</html>
