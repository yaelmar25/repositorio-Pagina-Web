<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Inicio de sesión - LEGACY JERSEYS</title>

    <style>

        body{
            font-family: Arial;
            text-align: center;
        }

        table{
            margin: auto;
        }

        td{
            padding: 20px;
        }

        button{
            padding: 10px;
        }

        input, select{
            padding: 8px;
        }

    </style>

</head>

<body>

    <header>
        <h1>LEGACY JERSEYS</h1>

        <input type="text" placeholder="Buscar jersey">
        <button>🔍</button>
    </header>

    <nav>
        <p>Inicio | Jerseys | Ofertas | Contacto | Inicio de sesión</p>
    </nav>

    <section>

        <h2>Inicio de sesión</h2>
        <p>Ingresa tus datos para acceder al sistema.</p>

        <form>

            <table border="1">

                <tr>
                    <td>
                        <label for="correo">Correo electrónico:</label><br><br>
                        <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="contrasena">Contraseña:</label><br><br>
                        <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="tipo_usuario">Tipo de usuario:</label><br><br>
                        <select id="tipo_usuario" name="tipo_usuario">
                            <option value="cliente">Cliente</option>
                            <option value="empleado">Empleado</option>
                            <option value="administrador">Administrador</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>
                        <input type="checkbox" id="recordarme" name="recordarme">
                        <label for="recordarme">Recordarme</label>
                    </td>
                </tr>

                <tr>
                    <td>
                        <button type="submit">Iniciar sesión</button>
                    </td>
                </tr>

            </table>

        </form>

        <br>

        <p>¿No tienes cuenta?</p>
        <a href="#">Crear una cuenta</a>

        <br><br>

        <a href="#">¿Olvidaste tu contraseña?</a>

    </section>

    <footer>
        <p>© 2026 LEGACY JERSEYS</p>
    </footer>

</body>

</html>
