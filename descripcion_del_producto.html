<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

</head>
<body style="font-family: sans-serif; margin: 0; padding: 20px; color: #111111;">

    <table width="100%" border="0" cellpadding="10" cellspacing="0">
        <tr>
            <td width="25%" align="left" valign="middle">
                <h1 style="color: #0044ff; font-style: italic; margin: 0; font-size: 28px;">LEGACY JERSEYS</h1>
            </td>
            
            <td width="50%" align="center" valign="middle">
                <input type="text" placeholder="🔍 Buscar jerseys..." style="width: 80%; padding: 8px; border: 1px solid #cccccc; border-radius: 4px;">
                <br><br>
                <font size="3">
                    <a href="#" style="text-decoration: none; color: #0044ff; margin: 0 15px;">Ofertas</a>

    <hr size="1" color="#eeeeee" style="margin-bottom: 20px;">

    <!--para que JavaScript escriba el nombre del jersey correspondiente más adelante-->


    <p style="font-size: 14px; color: #666666; margin-left: 10px;">

    </p>

    <br>


    <!--Divide la pantalla en dos grandes secciones: el área visual (izquierda) y el área informativa (derecha) -->
    <table width="100%" border="0" cellpadding="20" cellspacing="0">
        <tr>
            
            <td width="45%" align="center" valign="top" style="border: 1px solid #eeeeee; border-radius: 8px; padding: 20px;">
                <img id="producto-imagen" src="" alt="Jersey" width="85%" style="display: block; margin-bottom: 20px;">
                
                <table width="100%" border="0" cellpadding="5" cellspacing="0">
                    <tr>
                        <td align="center" width="33%">
                            <img id="mini-1" src="" alt="Vista 1" width="90%" style="border: 2px solid #0044ff; border-radius: 4px; padding: 2px;">
                        </td>
                        <td align="center" width="33%">
                            <img id="mini-2" src="" alt="Vista 2" width="90%" style="border: 1px solid #cccccc; border-radius: 4px; padding: 2px;">
                        </td>
                        <td align="center" width="33%">

                    </tr>

            </td>

            <td width="55%" align="left" valign="top" style="padding-left: 40px;">
                
                <h1 id="producto-titulo" style="color: #001155; font-size: 36px; margin-top: 0; margin-bottom: 25px;">Cargando...</h1>

                <table width="100%" border="0" cellpadding="12" cellspacing="0">
                    <tr style="border-bottom: 1px solid #eeeeee;">
                        <td width="30%" valign="top"><strong>Modelo:</strong></td>
                        <td id="producto-modelo" width="70%" valign="top" style="color: #555555;">-</td>
                    </tr>
                    <tr>
                        <td valign="top"><strong>Descripción:</strong></td>
                        <td id="producto-descripcion" valign="top" style="color: #555555; line-height: 1.5;">-</td>
                    </tr>
                    <tr>
                        <td valign="middle"><strong>Precio:</strong></td>
                        <td valign="middle">
                            <span id="producto-precio" style="font-size: 26px; color: #001155; font-weight: bold;">-</span>
                        </td>
                    </tr>
                    <tr>
                        <td valign="middle"><strong>Tallas disponibles:</strong></td>
                        <td valign="middle">
                            <button type="button" style="width: 40px; height: 35px; background: white; border: 1px solid #0044ff; color: #0044ff; border-radius: 4px; font-weight: bold; margin-right: 5px;">S</button>
                            <button type="button" style="width: 40px; height: 35px; background: white; border: 1px solid #cccccc; color: #555555; border-radius: 4px; margin-right: 5px;">M</button>
                            <button type="button" style="width: 40px; height: 35px; background: white; border: 1px solid #cccccc; color: #555555; border-radius: 4px; margin-right: 5px;">L</button>
                            <button type="button" style="width: 40px; height: 35px; background: white; border: 1px solid #cccccc; color: #555555; border-radius: 4px;">XL</button>
                        </td>
                    </tr>
                    <tr>
                        <td valign="middle"><strong>Cantidad en inventario:</strong></td>
                        <td valign="middle" style="color: #228844; font-weight: bold;">
                            <span id="producto-inventario">-</span>
                        </td>
                    </tr>
                    <tr>
                        <td valign="middle"><strong>Cantidad:</strong></td>
                        <td valign="middle">
                            <table border="1" cellspacing="0" cellpadding="5" style="border-collapse: collapse; border: 1px solid #cccccc;">
                                <tr>
                                    <td style="cursor: pointer; padding: 5px 10px;">-</td>
                                    <td style="padding: 5px 15px;">1</td>
                                    <td style="cursor: pointer; padding: 5px 10px;">+</td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>

                <br><br>

                <button type="button" style="width: 90%; background-color: #0044ff; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer;">
                    🛒 Agregar al carrito
                </button>
                
                <br><br>
                
                <button type="button" style="width: 90%; background-color: #f8f9fa; color: #0044ff; border: 1px solid #0044ff; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer;">
                    💙 Agregar a favoritos
                </button>

            </td>
        </tr>
    </table>

        //Detecta qué producto quiere ver el usuario leyendo la barra de navegación.
        //  Si la URL dice ...html?id=mexico, la variable idSeleccionado guardará el texto "mexico".


        // Captura el parámetro "?id=" desde la barra de direcciones del navegador
        const urlParams = new URLSearchParams(window.location.search);
        const idSeleccionado = urlParams.get('id');

        //Busca el producto "mexico" en la lista. Al encontrarlo, toma sus datos (como .titulo o .desc)
        //  y los escribe directamente sobre los id que dejamos preparados en las tablas del HTML.

        // Si el producto existe en la base de datos, lo dibuja automáticamente
        if (idSeleccionado && productos[idSeleccionado]) {
            const prod = productos[idSeleccionado];
            
            // Reemplazar textos
            document.title = "Legacy Jerseys - " + prod.titulo;
            document.getElementById("miga-producto").innerText = prod.titulo;
            document.getElementById("producto-titulo").innerText = prod.titulo;
            document.getElementById("producto-modelo").innerText = prod.modelo;
            document.getElementById("producto-descripcion").innerText = prod.desc;
            document.getElementById("producto-precio").innerText = prod.precio;
            document.getElementById("producto-inventario").innerText = prod.inventario;
            
            // Reemplazar imágenes (Nota: Asegúrate de guardar las fotos en una carpeta llamada "img")
            document.getElementById("producto-imagen").src = prod.img;
            document.getElementById("mini-1").src = prod.minis[0];
            document.getElementById("mini-2").src = prod.minis[1];
            document.getElementById("mini-3").src = prod.minis[2];
        } else {
            // En caso de que se acceda directamente sin un id válido muestra un mensaje
            document.getElementById("producto-titulo").innerText = "Selecciona un jersey en el catálogo";
            document.getElementById("miga-producto").innerText = "No seleccionado";
        }
    </script>
</body>
</html>
